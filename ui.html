<!DOCTYPE html>
<html>

<head>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      margin: 0;
      padding: 12px;
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: calc(100vh - 24px);
    }

    .cards {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .card {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fafafa;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-header input.device-name {
      flex: 1;
      font-weight: 600;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 4px;
      font-family: inherit;
    }

    .card-header input.device-name:hover,
    .card-header input.device-name:focus {
      border-color: #d0d0d0;
      background: #fff;
      outline: none;
    }

    .remove-btn {
      background: transparent;
      color: #999;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
    }

    .remove-btn:hover { background: #eee; color: #333; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .input-group { display: flex; flex-direction: column; gap: 3px; }

    .input-group label {
      font-size: 10px;
      color: #666;
    }

    .input-group input[type="number"] {
      width: 100%;
      padding: 5px 7px;
      font-size: 11px;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      outline: none;
      background: #fff;
    }

    .input-group input[type="number"]:focus { border-color: #18a0fb; }

    .feedback {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
      padding-top: 4px;
      border-top: 1px solid #ececec;
    }

    .feedback .label { color: #666; display: block; }
    .feedback .value { font-weight: 600; }
    .feedback.exact .value { color: #198754; }
    .feedback.not-exact .value { color: #dc3545; }

    .add-btn {
      background: transparent;
      color: #18a0fb;
      border: 1px dashed #b8dfff;
      border-radius: 6px;
      height: 30px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      width: 100%;
    }

    .add-btn:hover { background: #f0f8ff; }

    .toggles {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 10px;
      border: 1px solid #ececec;
      border-radius: 6px;
      background: #fafafa;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
    }

    .toggle-row label {
      flex: 1;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input[type="checkbox"] {
      margin: 0;
      cursor: pointer;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .actions button {
      background-color: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      height: 32px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
    }

    .actions button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .actions button:hover:not(:disabled) {
      background: #222;
    }

    .status {
      font-size: 10px;
      color: #666;
      text-align: center;
      min-height: 12px;
    }
    .status.ok { color: #198754; }
    .status.err { color: #dc3545; }
  </style>
</head>

<body>
  <div class="layout">
    <div class="cards" id="cards"></div>
    <button class="add-btn" id="add-device">+ Add Device</button>
    <div class="toggles">
      <div class="toggle-row">
        <label for="show-preview">Show preview frames</label>
        <input type="checkbox" id="show-preview" />
      </div>
      <div class="toggle-row">
        <label for="live-vars">Live update variables</label>
        <input type="checkbox" id="live-vars" />
      </div>
    </div>
    <div class="actions">
      <button id="update-variables">Update Responsive Variables</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const defaults = [
      { name: 'Desktop', maxWidth: 1440, columns: 12, gutterWidth: 24, marginWidth: 72 },
      { name: 'Tablet',  maxWidth: 1024, columns: 12, gutterWidth: 20, marginWidth: 80 },
      { name: 'Mobile',  maxWidth: 390,  columns: 6,  gutterWidth: 14, marginWidth: 16 },
    ];
    const fallbackNames = ['Desktop', 'Tablet', 'Mobile', 'Watch', 'TV', 'Custom'];

    let devices = defaults.map(d => ({ ...d }));

    const cardsEl = document.getElementById('cards');
    const addBtn = document.getElementById('add-device');
    const updateVarsBtn = document.getElementById('update-variables');
    const showPreviewToggle = document.getElementById('show-preview');
    const liveVarsToggle = document.getElementById('live-vars');
    const statusEl = document.getElementById('status');

    // Restore toggle state. Figma plugin iframes can throw on localStorage access,
    // so guard everything.
    function readPref(key, fallback) {
      try { const v = localStorage.getItem(key); return v == null ? fallback : v; }
      catch (e) { return fallback; }
    }
    function writePref(key, value) {
      try { localStorage.setItem(key, value); } catch (e) { /* ignore */ }
    }
    showPreviewToggle.checked = readPref('gridcalc.showPreview', '1') !== '0';
    liveVarsToggle.checked = readPref('gridcalc.liveVars', '0') === '1';

    function compute(device) {
      const { maxWidth, columns, gutterWidth, marginWidth } = device;
      const validNumbers =
        Number.isFinite(maxWidth) && maxWidth > 0 &&
        Number.isFinite(columns) && columns > 0 && Number.isInteger(columns) &&
        Number.isFinite(gutterWidth) && gutterWidth >= 0 &&
        Number.isFinite(marginWidth) && marginWidth >= 0;

      if (!validNumbers) {
        return { valid: false, isExact: false, pageWidth: NaN, columnWidth: NaN, contentWidth: NaN };
      }

      const contentWidth = maxWidth - 2 * marginWidth;
      const totalGutter = gutterWidth * (columns - 1);
      const columnWidth = (contentWidth - totalGutter) / columns;
      const isExact = Number.isInteger(columnWidth) && columnWidth > 0;

      return { valid: true, isExact, pageWidth: maxWidth, columnWidth, contentWidth };
    }

    function fmt(n) {
      if (!Number.isFinite(n)) return '—';
      return Number.isInteger(n) ? `${n}px` : `${n.toFixed(2)}px`;
    }

    function escapeAttr(s) {
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function buildPayload() {
      return devices.map(d => {
        const r = compute(d);
        return { ...d, columnWidth: r.columnWidth, contentWidth: r.contentWidth };
      });
    }

    function allValid() {
      return devices.length > 0 && devices.every(d => compute(d).isExact);
    }

    function updateButtons() {
      updateVarsBtn.disabled = !allValid();
    }

    function setStatus(text, kind) {
      statusEl.textContent = text || '';
      statusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    function debounce(fn, ms) {
      let t;
      return function (...args) {
        clearTimeout(t);
        t = setTimeout(() => fn.apply(null, args), ms);
      };
    }

    const sendPreview = debounce(() => {
      if (!allValid()) return;
      parent.postMessage({
        pluginMessage: {
          type: 'sync-preview',
          devices: buildPayload(),
          showPreview: showPreviewToggle.checked,
        }
      }, '*');
    }, 150);

    const sendLiveVars = debounce(() => {
      if (!liveVarsToggle.checked) return;
      if (!allValid()) return;
      parent.postMessage({
        pluginMessage: {
          type: 'upsert-variables',
          devices: buildPayload(),
          silent: true,
        }
      }, '*');
    }, 250);

    function pushPreview() {
      // Always notify (even if devices invalid, plugin no-ops).
      sendPreview();
    }

    function pushPreviewAndLive() {
      pushPreview();
      sendLiveVars();
    }

    function render() {
      cardsEl.innerHTML = '';
      devices.forEach((device, index) => {
        const result = compute(device);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-header">
            <input class="device-name" type="text" value="${escapeAttr(device.name)}" data-field="name" data-index="${index}" />
            <button class="remove-btn" data-action="remove" data-index="${index}" title="Remove device" ${devices.length === 1 ? 'style="visibility:hidden"' : ''}>×</button>
          </div>
          <div class="grid-2">
            <div class="input-group">
              <label>Max Width</label>
              <input type="number" data-field="maxWidth" data-index="${index}" value="${device.maxWidth}" />
            </div>
            <div class="input-group">
              <label>Columns</label>
              <input type="number" data-field="columns" data-index="${index}" value="${device.columns}" />
            </div>
            <div class="input-group">
              <label>Gutter Width</label>
              <input type="number" data-field="gutterWidth" data-index="${index}" value="${device.gutterWidth}" />
            </div>
            <div class="input-group">
              <label>Margin Width</label>
              <input type="number" data-field="marginWidth" data-index="${index}" value="${device.marginWidth}" />
            </div>
          </div>
          <div class="feedback ${result.valid && result.isExact ? 'exact' : 'not-exact'}">
            <div><span class="label">Page Width</span><span class="value">${fmt(result.pageWidth)}</span></div>
            <div><span class="label">Column Width</span><span class="value">${fmt(result.columnWidth)}</span></div>
          </div>
        `;
        cardsEl.appendChild(card);
      });
      updateButtons();
    }

    cardsEl.addEventListener('input', (e) => {
      const t = e.target;
      const field = t.dataset.field;
      const index = parseInt(t.dataset.index, 10);
      if (field == null || Number.isNaN(index)) return;
      if (field === 'name') {
        devices[index].name = t.value;
      } else if (field === 'columns') {
        devices[index][field] = parseInt(t.value, 10);
      } else {
        devices[index][field] = parseFloat(t.value);
      }
      // Update feedback in place to preserve focus.
      const card = t.closest('.card');
      const result = compute(devices[index]);
      const fb = card.querySelector('.feedback');
      fb.className = 'feedback ' + (result.valid && result.isExact ? 'exact' : 'not-exact');
      const values = fb.querySelectorAll('.value');
      values[0].textContent = fmt(result.pageWidth);
      values[1].textContent = fmt(result.columnWidth);
      updateButtons();
      pushPreviewAndLive();
    });

    cardsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action="remove"]');
      if (!btn) return;
      const index = parseInt(btn.dataset.index, 10);
      devices.splice(index, 1);
      render();
      pushPreviewAndLive();
    });

    addBtn.addEventListener('click', () => {
      const used = new Set(devices.map(d => d.name));
      const name = fallbackNames.find(n => !used.has(n)) || `Device ${devices.length + 1}`;
      devices.push({ name, maxWidth: 1440, columns: 12, gutterWidth: 24, marginWidth: 72 });
      render();
      pushPreviewAndLive();
    });

    showPreviewToggle.addEventListener('change', () => {
      writePref('gridcalc.showPreview', showPreviewToggle.checked ? '1' : '0');
      pushPreview();
    });

    liveVarsToggle.addEventListener('change', () => {
      writePref('gridcalc.liveVars', liveVarsToggle.checked ? '1' : '0');
      if (liveVarsToggle.checked) sendLiveVars();
    });

    updateVarsBtn.addEventListener('click', () => {
      if (updateVarsBtn.disabled) return;
      parent.postMessage({
        pluginMessage: {
          type: 'upsert-variables',
          devices: buildPayload(),
          silent: false,
        }
      }, '*');
    });

    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'error') {
        setStatus(msg.message, 'err');
      } else if (msg.type === 'variables-updated') {
        setStatus(msg.silent ? 'Variables synced' : 'Variables updated', 'ok');
        clearTimeout(window.__statusTimer);
        window.__statusTimer = setTimeout(() => setStatus(''), 2000);
      }
    };

    render();
    // Initial preview push so frames appear immediately on open.
    pushPreview();
  </script>
</body>

</html>
